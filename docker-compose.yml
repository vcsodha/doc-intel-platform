version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=doc_intel
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  go-gateway:
    build: 
      context: ./go-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - SHARED_VOL=/shared_data
    depends_on:
      - redis
    volumes:
      - ./shared_data:/shared_data

  python-worker:
    build: 
      context: ./python-worker
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - redis
      - postgres
    volumes:
      - ./shared_data:/shared_data

  spring-analytics:
    build:
      context: ./spring-analytics
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/doc_intel
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - postgres

volumes:
  ollama_data:
